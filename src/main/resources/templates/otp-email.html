<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        .container { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; text-align: center; color: #333; }
        .otp-card { border: 1px solid #e0e0e0; border-radius: 12px; padding: 40px; background-color: #ffffff; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .otp-code { font-size: 32px; font-weight: bold; letter-spacing: 8px; color: #2c3e50; background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px dashed #bdc3c7; }
        .header-text { color: #7f8c8d; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .expiry-text { font-size: 12px; color: #e74c3c; margin-top: 10px; }
        .footer { margin-top: 30px; font-size: 11px; color: #bdc3c7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="otp-card">
            <div class="header-text">Verification Code</div>
            <p>Hello <strong th:text="${fullName}">User</strong>,</p>
            <p>Use the following code to verify your profile update:</p>
            
            <div class="otp-code" th:text="${otp}">000000</div>
            
            <div class="expiry-text">
                This code is valid for <strong>5 minutes</strong>.
            </div>
        </div>
        <div class="footer">
            If you did not request this code, please ignore this email.<br/>
            &copy; 2026 Inventry Management System
        </div>
    </div>
</body>
</html>
