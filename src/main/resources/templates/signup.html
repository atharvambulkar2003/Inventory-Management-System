<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        .container { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; color: #333; }
        .header { background-color: #2c3e50; color: white; padding: 10px; text-align: center; border-radius: 5px; }
        .content { margin-top: 20px; line-height: 1.6; }
        .footer { margin-top: 30px; font-size: 12px; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to IMS!</h1>
        </div>
        <div class="content">
            <p>Hello <strong th:text="${fullName}">User</strong>,</p>
            <p>Congratulations! Your registration as an <strong>OWNER</strong> for <span th:text="${storeName}">Store</span> was successful.</p>
            <p>You can now log in and start managing your inventory, staff, and sales.</p>
        </div>
        <div class="footer">
            <p>Regards,<br/>Inventry Management System Team</p>
        </div>
    </div>
</body>
</html>
